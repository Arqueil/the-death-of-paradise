<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>The Death of Paradise — Мир</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #7A7A7A; margin: 0; height: 100vh; overflow: hidden; }
        canvas { display: block; background: #9E9E9E; }
    </style>
</head>
<body>
<script src="character-renderer.js"></script>
<script>
    const canvas = document.createElement('canvas');
    canvas.style.display = 'block';
    canvas.style.background = '#9E9E9E';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function getCharData() {
        return JSON.parse(localStorage.getItem('tdop_character') || '{}');
    }

    let charData = getCharData();
    const nickname = charData.nickname || 'Гость';
    const heightScale = parseFloat(charData.height || '1');

    let playerX = canvas.width / 2;
    let playerY = canvas.height / 2;
    const speed = 3;
    const keys = {};

    document.addEventListener('keydown', (e) => {
        keys[e.key.toLowerCase()] = true;
        e.preventDefault();
    });
    document.addEventListener('keyup', (e) => {
        keys[e.key.toLowerCase()] = false;
        e.preventDefault();
    });

    let charCanvas = null;
    function updateCharCanvas() {
        charData = getCharData();
        if (charData.skinColor) {
            charCanvas = renderToCanvas(charData, 0.25 * heightScale);
        }
    }
    onReady(updateCharCanvas);
    loadAllImages(updateCharCanvas);

    function loop() {
        if (keys['w'] || keys['ц']) playerY -= speed;
        if (keys['s'] || keys['ы']) playerY += speed;
        if (keys['a'] || keys['ф']) playerX -= speed;
        if (keys['d'] || keys['в']) playerX += speed;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (charCanvas) {
            ctx.drawImage(charCanvas, playerX - charCanvas.width/2, playerY - charCanvas.height/2);
        } else {
            ctx.fillStyle = '#F2E7CD';
            ctx.fillRect(playerX - 16, playerY - 16, 32, 32);
        }

        ctx.fillStyle = '#fff';
        ctx.font = '16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(nickname, playerX, playerY - (charCanvas ? charCanvas.height/2 - 10 : 24));

        requestAnimationFrame(loop);
    }

    // При возврате с редактора — обновляем персонажа
    window.addEventListener('focus', () => {
        updateCharCanvas();
    });
</script>
</body>
</html>
